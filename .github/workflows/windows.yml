name: Windows Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  LIBXL_VERSION: "5.1.0"

jobs:
  windows-matrix:
    name: Generate Windows build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        uses: php/php-windows-builder/extension-matrix@v1
        with:
          extension-url: ${{ github.event.repository.html_url }}
          php-version-list: '8.3, 8.4'

  windows-build:
    name: Build ${{ matrix.php-version }} ${{ matrix.arch }} ${{ matrix.ts }}
    needs: windows-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.windows-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache LibXL
        id: cache-libxl
        uses: actions/cache@v4
        with:
          path: deps
          key: libxl-win-${{ env.LIBXL_VERSION }}

      - name: Download LibXL
        if: steps.cache-libxl.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.libxl.com/download/libxl-win-${{ env.LIBXL_VERSION }}.zip" -OutFile libxl.zip
          Expand-Archive libxl.zip -DestinationPath libxl-extract
          $dir = Get-ChildItem -Path libxl-extract -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Path deps -Force
          Copy-Item -Path "$($dir.FullName)\include_c\*" -Destination deps\ -Recurse -Force
          Copy-Item -Path "$($dir.FullName)\lib64\*" -Destination deps\ -Recurse -Force
          Copy-Item -Path "$($dir.FullName)\bin64\*" -Destination deps\ -Recurse -Force

      - name: Prepare deps directory
        shell: pwsh
        run: |
          # Ensure deps has the layout php-windows-builder expects
          if (-not (Test-Path deps\libxl.h)) {
            Write-Error "deps directory missing libxl.h"
            exit 1
          }
          Get-ChildItem deps\

      - name: Build extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          ts: ${{ matrix.ts }}
          arch: ${{ matrix.arch }}
          args: --with-excel --with-libxl=deps
          deps-path: deps

  release:
    name: Attach Windows DLLs to release
    if: startsWith(github.ref, 'refs/tags/')
    needs: windows-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload release artifacts
        uses: php/php-windows-builder/release@v1
        with:
          release: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
