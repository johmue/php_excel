name: Windows Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  windows-matrix:
    name: Generate Windows build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        uses: php/php-windows-builder/extension-matrix@v1
        with:
          extension-url: ${{ github.event.repository.html_url }}
          php-version-list: '8.3, 8.4, 8.5'

  windows-build:
    name: Build ${{ matrix.php-version }} ${{ matrix.arch }} ${{ matrix.ts }}
    needs: windows-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.windows-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          ts: ${{ matrix.ts }}
          arch: ${{ matrix.arch }}
          args: --with-excel --with-libxl=${{ github.workspace }}\libxl
          libs: libxl
        env:
          LIBXL_URL: https://www.libxl.com/download/libxl-win-5.1.0.zip

  release:
    name: Attach Windows DLLs to release
    if: startsWith(github.ref, 'refs/tags/')
    needs: windows-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload release artifacts
        uses: php/php-windows-builder/release@v1
        with:
          release: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
